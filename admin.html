<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Coro Runners</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; padding: 30px; color: #1e293b; margin: 0; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-header h1 { color: #ea580c; margin: 0; font-size: 2.5rem; font-weight: 800; }
        .stats-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stats-box span { display: block; font-size: 2rem; font-weight: 800; color: #0cb4b6; }
        .stats-box p { margin: 5px 0 0; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        
        .table-container { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #e2e8f0; padding: 15px; text-align: left; }
        th { background: #f1f5f9; color: #475569; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        td { font-size: 0.95rem; }
        tr:hover { background: #f8fafc; }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .badge.pendiente { background: #fee2e2; color: #ef4444; }
        .badge.validado { background: #dcfce3; color: #22c55e; }
        
        .btn { padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: all 0.2s; font-size: 0.85rem; }
        .btn-view { background: #3b82f6; color: white; margin-right: 5px; }
        .btn-view:hover { background: #2563eb; }
        .btn-validate { background: #10b981; color: white; }
        .btn-validate:hover { background: #059669; }
        .btn-export { background: #f59e0b; color: white; padding: 12px 20px; font-size: 1rem; }
        
        /* Modal para ver imagen */
        .capture-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .capture-modal img { max-width: 90%; max-height: 90%; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .close-capture { position: absolute; top: 30px; right: 40px; color: white; font-size: 40px; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>Dashboard - Inscripciones</h1>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="stats-box">
                <span id="total-count">0</span>
                <p>Total Inscritos</p>
            </div>
            <button class="btn btn-export" onclick="window.print()">Exportar PDF / Imprimir Listado</button>
        </div>
    </div>

    <div class="table-container">
        <table id="runners-table">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Corredor</th>
                    <th>Cédula</th>
                    <th>Teléfono</th>
                    <th>Talla</th>
                    <th>Ref. Pago</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Contenido generado por JS -->
            </tbody>
        </table>
    </div>

    <div class="capture-modal" id="capture-modal">
        <span class="close-capture" onclick="closeModal()">×</span>
        <img id="capture-img" src="" alt="Capture de Pago">
    </div>

    <script>
        async function fetchRunners() {
            try {
                const res = await fetch('/api/runners');
                const runners = await res.json();
                
                const tbody = document.querySelector('#runners-table tbody');
                tbody.innerHTML = '';
                
                document.getElementById('total-count').innerText = runners.length;

                runners.forEach(runner => {
                    const date = new Date(runner.fechaRegistro).toLocaleDateString('es-VE', { hour: '2-digit', minute: '2-digit' });
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${runner.codigo}</strong></td>
                        <td>${runner.nombre} ${runner.apellido}<br><small style="color:#64748b">${runner.correo}</small></td>
                        <td>${runner.cedula}</td>
                        <td>${runner.telefono}</td>
                        <td><strong>${runner.talla}</strong></td>
                        <td>${runner.referencia}</td>
                        <td>${date}</td>
                        <td><span class="badge ${runner.estadoPago.toLowerCase()}">${runner.estadoPago}</span></td>
                        <td>
                            <button class="btn btn-view" onclick="viewCapture('${runner.capturePath}')">Ver Capture</button>
                            ${runner.estadoPago === 'Pendiente' ? `<button class="btn btn-validate" onclick="validatePayment(${runner.id}, '${runner.nombre}')">Validar</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error cargando corredores', error);
            }
        }

        async function validatePayment(id, nombre) {
            if(!confirm(`¿Estás seguro de validar el pago de ${nombre}?\nEsto enviará un correo automático de confirmación.`)) return;
            
            try {
                const res = await fetch('/api/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const result = await res.json();
                if(result.success) {
                    alert('Pago validado exitosamente. Se ha habilitado al corredor.');
                    fetchRunners(); // Recargar la tabla
                } else {
                    alert('Hubo un error: ' + result.error);
                }
            } catch (error) {
                alert('Error de conexión.');
            }
        }

        function viewCapture(path) {
            if(!path || path === 'null') return alert('No hay imagen de captura disponible.');
            document.getElementById('capture-img').src = path;
            document.getElementById('capture-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('capture-modal').style.display = 'none';
        }

        // Cargar datos al iniciar
        fetchRunners();
    </script>
</body>
</html>
